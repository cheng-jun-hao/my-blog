<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - 页面未找到 | CJH 的技术博客</title>
  <style>
    @import url('https://fonts.loli.net/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg-primary: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #6c757d;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --card-bg: #f8fafc;
      --border-color: #e2e8f0;
      --shadow-color: rgba(37, 99, 235, 0.15);
    }

    [data-theme="dark"] {
      --bg-primary: #0f172a;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --card-bg: #1e293b;
      --border-color: #334155;
      --shadow-color: rgba(59, 130, 246, 0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background-color 0.3s ease, color 0.3s ease;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 2rem;
      animation: fadeInUp 0.8s ease-out;
    }

    .number-404 {
      font-size: clamp(8rem, 20vw, 14rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 50%, #2563eb 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease infinite;
      margin-bottom: 1rem;
      user-select: none;
    }

    .message-title {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    .message-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.125rem);
      color: var(--text-secondary);
      margin-bottom: 2.5rem;
      font-weight: 400;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 2rem;
      background-color: var(--accent);
      color: #ffffff;
      text-decoration: none;
      border-radius: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 14px var(--shadow-color);
    }

    .btn-home:hover {
      background-color: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--shadow-color);
    }

    .btn-home:active {
      transform: translateY(0);
    }

    .btn-home svg {
      width: 1.125rem;
      height: 1.125rem;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .theme-toggle {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      width: 2.75rem;
      height: 2.75rem;
      border: 1px solid var(--border-color);
      border-radius: 0.75rem;
      background-color: var(--card-bg);
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
      font-size: 1.25rem;
    }

    .theme-toggle:hover {
      transform: scale(1.05);
      border-color: var(--accent);
    }

    .theme-toggle svg {
      width: 1.25rem;
      height: 1.25rem;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon-sun {
      display: none;
    }

    [data-theme="dark"] .icon-moon {
      display: none;
    }

    [data-theme="dark"] .icon-sun {
      display: block;
    }

    .footer-text {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.8125rem;
      color: var(--text-secondary);
      opacity: 0.6;
    }

    .footer-text a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer-text a:hover {
      text-decoration: underline;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes gradientShift {
      0%, 100% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .container {
        animation: none;
      }
      .number-404 {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <button class="theme-toggle" type="button" aria-label="切换深色模式">
    <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>

  <div class="container">
    <div class="number-404">404</div>
    <h1 class="message-title">页面未找到</h1>
    <p class="message-subtitle">你访问的页面不存在或已被移动</p>
    <a href="/my-blog/" class="btn-home">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      返回首页
    </a>
  </div>

  <p class="footer-text">CJH 的技术博客</p>

  <script>
    (function() {
      var key = 'theme';
      var toggle = document.querySelector('.theme-toggle');
      function apply(t) {
        document.documentElement.setAttribute('data-theme', t);
        try { localStorage.setItem(key, t); } catch(e) {}
      }
      var saved = null;
      try { saved = localStorage.getItem(key); } catch(e) {}
      if (saved === 'dark' || saved === 'light') {
        apply(saved);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        apply('dark');
      }
      toggle.addEventListener('click', function() {
        var cur = document.documentElement.getAttribute('data-theme');
        apply(cur === 'dark' ? 'light' : 'dark');
      });
    })();
  </script>
</body>
</html>
